name: CI with Coverage

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y lcov g++-10 cmake
        sudo update-alternatives --install /usr/bin/g++ g++ /usr/bin/g++-10 90
        sudo update-alternatives --install /usr/bin/gcov gcov /usr/bin/gcov-10 90
    
    - name: Clean build directory
      run: |
        rm -rf build
        mkdir -p build
    
    - name: Configure CMake
      run: |
        cd build
        cmake .. -DBUILD_TESTS=ON -DCMAKE_BUILD_TYPE=Debug
    
    - name: Build
      run: |
        cd build
        make -j2
    
    - name: Run tests
      run: |
        cd build
        ctest --output-on-failure
    
    - name: Generate coverage data
      run: |
        cd build
        ./banking_tests
        cd ..
        lcov --capture --directory . --output-file coverage.info --no-external --ignore-errors inconsistent,gcov,source
        lcov --remove coverage.info '*/third-party/*' --output-file coverage.info --ignore-errors unused
        lcov --remove coverage.info '*/tests/*' --output-file coverage.info --ignore-errors unused
        lcov --remove coverage.info '/usr/*' --output-file coverage.info --ignore-errors unused
        lcov --remove coverage.info '*/build/*' --output-file coverage.info --ignore-errors unused
    
    - name: Print coverage summary
      run: |
        lcov --summary coverage.info 2>&1 || true
        echo ""
        echo "=== Coverage percentages ==="
        lcov --list coverage.info 2>&1 | grep -E "\.(cpp|hpp)" | head -20
    
    - name: Generate HTML report
      run: |
        genhtml coverage.info --output-directory coverage_report --ignore-errors source || true
    
    - name: Upload coverage report as artifact
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: coverage_report/
        retention-days: 7
    
    - name: Check coverage percentage
      run: |
        # Extract coverage percentage
        COVERAGE=$(lcov --summary coverage.info 2>&1 | grep "lines" | awk '{print $2}' | sed 's/%//' || echo "0")
        echo "Coverage: ${COVERAGE}%"
        
        # Check if coverage is 100%
        if [ -z "$COVERAGE" ]; then
          echo "⚠️ Could not determine coverage percentage"
          exit 0
        fi
        
        if (( $(echo "$COVERAGE < 100" | bc -l 2>/dev/null || echo "0") )); then
          echo "❌ Coverage is ${COVERAGE}%, but expected 100%"
          echo "📊 Detailed coverage:"
          lcov --list coverage.info 2>&1 | head -30
          exit 1
        else
          echo "✅✅✅ Coverage is 100%! ✅✅✅"
        fi
    
    - name: Display test results
      run: |
        echo ""
        echo "=== Test Results ==="
        cat build/Testing/Temporary/LastTest.log 2>/dev/null || echo "Test log not found"
