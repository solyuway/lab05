name: CI

on: push

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
    
    - name: Install gcovr
      run: |
        sudo apt-get update
        sudo apt-get install -y g++ cmake python3-pip
        pip3 install gcovr
    
    - name: Build
      run: |
        mkdir build && cd build
        cmake .. -DBUILD_TESTS=ON -DCMAKE_CXX_FLAGS="--coverage"
        make && ./banking_tests
        cd ..
    
    - name: Coverage
      run: |
        cd build
        gcovr --root .. --exclude '.*/third-party/.*' --exclude '.*/tests/.*' --txt
        gcovr --root .. --exclude '.*/third-party/.*' --exclude '.*/tests/.*' --txt | grep -q "100%" && echo "✅ 100% coverage!" || (echo "❌ Not 100%" && exit 1)
