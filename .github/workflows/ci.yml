name: CI
on: push

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y lcov g++-10 cmake
    
    - name: Build with coverage
      run: |
        rm -rf build
        mkdir build && cd build
        cmake .. -DBUILD_TESTS=ON -DCMAKE_CXX_FLAGS="--coverage -O0 -g"
        make -j2
    
    - name: Run tests
      run: |
        cd build
        ./banking_tests
    
    - name: Generate coverage
      run: |
        cd build
        lcov --capture --directory . --output-file coverage.info --no-external
        lcov --remove coverage.info '*/third-party/*' -o coverage.info
        lcov --remove coverage.info '*/tests/*' -o coverage.info
        lcov --remove coverage.info '/usr/*' -o coverage.info
    
    - name: Show coverage
      run: |
        cd build
        echo "=== Coverage Report ==="
        lcov --summary coverage.info 2>&1 || true
        echo ""
        lcov --list coverage.info 2>&1 | head -30
    
    - name: Verify 100%
      run: |
        cd build
        # Проверяем Account.cpp
        if lcov --list coverage.info 2>&1 | grep "banking/Account.cpp" | grep -q "100.0%"; then
          echo "✅ Account.cpp: 100% coverage"
        else
          echo "❌ Account.cpp coverage not 100%"
          lcov --list coverage.info 2>&1 | grep "Account.cpp"
          exit 1
        fi
        
        # Проверяем Transaction.cpp
        if lcov --list coverage.info 2>&1 | grep "banking/Transaction.cpp" | grep -q "100.0%"; then
          echo "✅ Transaction.cpp: 100% coverage"
        else
          echo "❌ Transaction.cpp coverage not 100%"
          lcov --list coverage.info 2>&1 | grep "Transaction.cpp"
          exit 1
        fi
        
        echo ""
        echo "🎉🎉🎉 SUCCESS: 100% code coverage! 🎉🎉🎉"
