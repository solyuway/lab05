name: CI with Coverage

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y lcov g++-10 cmake
        sudo update-alternatives --install /usr/bin/g++ g++ /usr/bin/g++-10 90
        sudo update-alternatives --install /usr/bin/gcov gcov /usr/bin/gcov-10 90
    
    - name: Configure CMake with coverage
      run: |
        rm -rf build
        mkdir -p build
        cd build
        cmake .. -DBUILD_TESTS=ON -DCMAKE_BUILD_TYPE=Debug \
                 -DCMAKE_CXX_FLAGS="--coverage -O0 -g" \
                 -DCMAKE_EXE_LINKER_FLAGS="--coverage"
    
    - name: Build
      run: |
        cd build
        make -j2
    
    - name: Run tests and generate coverage data
      run: |
        cd build
        ./banking_tests
        cd ..
    
    - name: Generate coverage report
      run: |
        lcov --capture --directory build --output-file coverage.info \
             --no-external --ignore-errors inconsistent,gcov,source,empty
        lcov --remove coverage.info '*/third-party/*' --output-file coverage.info \
             --ignore-errors unused,empty
        lcov --remove coverage.info '*/tests/*' --output-file coverage.info \
             --ignore-errors unused,empty
        lcov --remove coverage.info '/usr/*' --output-file coverage.info \
             --ignore-errors unused,empty
        lcov --remove coverage.info '*/build/_deps/*' --output-file coverage.info \
             --ignore-errors unused,empty
    
    - name: Show coverage summary
      run: |
        echo "=== Coverage Report ==="
        lcov --summary coverage.info 2>&1 || true
        echo ""
        echo "=== Account.cpp ==="
        lcov --list coverage.info 2>&1 | grep "Account.cpp" -A1 || true
        echo ""
        echo "=== Transaction.cpp ==="
        lcov --list coverage.info 2>&1 | grep "Transaction.cpp" -A1 || true
    
    - name: Check 100 percent coverage
      run: |
        ACCOUNT_COV=$(lcov --list coverage.info 2>&1 | grep "banking/Account.cpp" | awk '{print $2}' | sed 's/%//' || echo "0")
        TRANSACTION_COV=$(lcov --list coverage.info 2>&1 | grep "banking/Transaction.cpp" | awk '{print $2}' | sed 's/%//' || echo "0")
        
        echo "Account.cpp coverage: ${ACCOUNT_COV}%"
        echo "Transaction.cpp coverage: ${TRANSACTION_COV}%"
        
        if [ "$ACCOUNT_COV" = "100" ] && [ "$TRANSACTION_COV" = "100" ]; then
          echo "✅✅✅ SUCCESS: Both files have 100% coverage! ✅✅✅"
        else
          echo "❌ Coverage is not 100%"
          echo "Account.cpp: ${ACCOUNT_COV}%"
          echo "Transaction.cpp: ${TRANSACTION_COV}%"
          exit 1
        fi
    
    - name: Generate HTML report
      run: |
        genhtml coverage.info --output-directory coverage_report \
               --ignore-errors source,corrupt,empty
    
    - name: Upload coverage report
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: coverage_report/
        retention-days: 7
