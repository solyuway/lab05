name: CI
on: push

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y g++-10 cmake python3-pip
        pip3 install gcovr
    
    - name: Build and test
      run: |
        mkdir build && cd build
        cmake .. -DBUILD_TESTS=ON -DCMAKE_CXX_FLAGS="--coverage"
        make -j2
        ./banking_tests
        cd ..
    
    - name: Generate coverage report
      run: |
        cd build
        gcovr --root .. --filter '.*/banking/.*\.cpp' --exclude '.*/tests/.*' --exclude '.*/_deps/.*' --txt
    
    - name: Check Account.cpp
      run: |
        cd build
        gcovr --root .. --filter '.*/banking/Account.cpp' --txt | grep -q "100%"
    
    - name: Check Transaction.cpp
      run: |
        cd build
        gcovr --root .. --filter '.*/banking/Transaction.cpp' --txt | grep -q "100%"
    
    - name: Success message
      run: echo "✅ 100% coverage achieved!"
