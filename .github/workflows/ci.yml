name: CI
on: push

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install
      run: sudo apt-get update && sudo apt-get install -y g++-10 cmake
      run: pip3 install gcovr
    
    - name: Build & test
      run: |
        mkdir build && cd build
        cmake .. -DBUILD_TESTS=ON -DCMAKE_CXX_FLAGS="--coverage"
        make && ./banking_tests
        cd ..
    
    - name: Coverage
      run: |
        cd build
        gcovr --root .. --filter '.*/banking/.*\.cpp' --exclude '.*/tests/.*' --exclude '.*/_deps/.*' --txt
        gcovr --root .. --filter '.*/banking/Account.cpp' --txt | grep "100%"
        gcovr --root .. --filter '.*/banking/Transaction.cpp' --txt | grep "100%"
        echo "✅ 100% coverage!"
